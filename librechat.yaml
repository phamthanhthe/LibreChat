# librechat.yaml
version: 1.0.5
cache: true

endpoints:
  # Chỉ định nghĩa 3 endpoints cần giữ
  openAI:
    apiKey: "${OPENAI_API_KEY}"
    models:
      default: [
        "gpt-4",
        "gpt-4-turbo", 
        "gpt-3.5-turbo"
      ]
      
  google:
    apiKey: "${GOOGLE_KEY}"
    models:
      default: [
        "gemini-pro",
        "gemini-pro-vision"
      ]
      
  anthropic:
    apiKey: "${ANTHROPIC_API_KEY}"
    models:
      default: [
        "claude-3-opus-20240229",
        "claude-3-sonnet-20240229",
        "claude-3-haiku-20240307"
      ]

# KHÔNG định nghĩa các endpoints khác = chúng sẽ bị disable
